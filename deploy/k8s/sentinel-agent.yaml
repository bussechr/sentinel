---
# sentinel-agent DaemonSet — one pod per node for runtime capture
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sentinel-agent
  labels:
    app: sentinel-agent
    component: collector
spec:
  selector:
    matchLabels:
      app: sentinel-agent
  template:
    metadata:
      labels:
        app: sentinel-agent
    spec:
      serviceAccountName: sentinel-agent
      hostPID: true        # Required for kernel-level capture via Tetragon
      hostNetwork: false
      tolerations:
        - operator: Exists  # Run on all nodes including control-plane
      containers:
        - name: sentinel-agent
          image: your-registry/sentinel-agent:v1
          env:
            - name: SENTINEL_API_ENDPOINT
              value: http://sentinel-api:8080
            - name: SENTINEL_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: false        # Tetragon handles privilege separately
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: run-spire
              mountPath: /run/spire/sockets
              readOnly: true
      volumes:
        - name: run-spire
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sentinel-agent
---
# ClusterRole so the agent can read node metadata.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sentinel-agent
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sentinel-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sentinel-agent
subjects:
  - kind: ServiceAccount
    name: sentinel-agent
    namespace: default
