## Sentinel Helm values
## Override these per environment.

global:
  registry: your-registry
  imageTag: v1
  namespace: sentinel

api:
  replicaCount: 2
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  mode: guard
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    environment: prod
    listen: 0.0.0.0:8080
    evidenceWindow: 72h
    defaultRedactionProfile: default-prod
    otelEndpoint: otel-collector:4317
    policyBundleURL: http://opa:8181/v1/bundles/sentinel
    shadowBundleURL: ""
    shadowBundleID: ""
    ledgerBackend: cometbft
    cometbftRPC: http://sentinel-cometbft:26657
    failClosedFor: [high, critical]

agent:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

chainApp:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  replicas: 1
  persistence:
    size: 10Gi
    storageClass: ""

cometbft:
  enabled: true
  replicas: 1
  image:
    repository: cometbft/cometbft
    tag: v0.38.12
    pullPolicy: IfNotPresent
  service:
    rpcPort: 26657
    p2pPort: 26656
  validatorKeys:
    existingSecret: sentinel-validator-keys
    mountPath: /etc/cometbft/keys
  persistence:
    size: 20Gi
    storageClass: ""

opa:
  enabled: true
  image: openpolicyagent/opa:latest-rootless
  bundleConfigMap: sentinel-policy-bundle

postgres:
  # Set to false to use an external Postgres instance.
  enabled: true
  auth:
    username: sentinel
    database: sentinel
    existingSecret: sentinel-postgres
  ha:
    synchronousReplication: false
    pitr: false
    walArchiveBucket: ""
    snapshotRetentionDays: 7

objectStore:
  bucket: kyb-sentinel-cold-dev
  versioning: true
  objectLock: true

otelCollector:
  enabled: true

serviceMonitor:
  enabled: false
  interval: 30s

secrets:
  # Name of an existing Kubernetes secret containing:
  #   dsn: postgres DSN string
  postgresDSNSecret: sentinel-postgres
  # Name of an existing Kubernetes secret containing:
  #   key: 64-byte ed25519 private key (raw, hex, or base64)
  chainKeySecret: sentinel-chain-key

mtls:
  enabled: false  # Enable in production with cert-manager
