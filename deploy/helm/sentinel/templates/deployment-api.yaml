{{- /* sentinel-api Deployment template */ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel.fullname" . }}-api
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinel.selectorLabels" . | nindent 6 }}
      component: api
  template:
    metadata:
      labels:
        {{- include "sentinel.selectorLabels" . | nindent 8 }}
        component: api
    spec:
      containers:
        - name: sentinel-api
          image: "{{ .Values.global.registry }}/sentinel-api:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SENTINEL_CONFIG_FILE
              value: /etc/sentinel/sentinel.yaml
            - name: SENTINEL_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.postgresDSNSecret }}
                  key: dsn
          volumeMounts:
            - name: config
              mountPath: /etc/sentinel
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "sentinel.fullname" . }}-config
